services:
  - type: web
    name: college-site
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py bootstrap_site && gunicorn college_site.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1,localhost
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_SUPERUSER_USERNAME
        value: admin
      - key: DEFAULT_SUPERUSER_PASSWORD
        value: admin
      - key: DEFAULT_SUPERUSER_EMAIL
        value: admin@example.com
